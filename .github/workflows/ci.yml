name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test-frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint

      - name: Build frontend for tests
        run: bun run build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}

      - name: Start preview server (background)
        run: |
          bunx vite preview --port 3000 --host 0.0.0.0 > preview.log 2>&1 &
          echo $! > .preview_pid

      - name: Wait for preview server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sSf "http://127.0.0.1:3000" >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server ($i/30)..."
            sleep 1
          done

      - name: Run tests
        run: bun run test:run

      - name: Run E2E tests
        run: |
          bunx playwright install --with-deps
          bun run test:e2e

      - name: Stop preview server
        if: always()
        run: |
          if [ -f .preview_pid ]; then
            kill "$(cat .preview_pid)" || true
            rm .preview_pid
          fi

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        if: ${{ always() && secrets.CODECOV_TOKEN != '' }}
        with:
          directory: ./coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint-and-test-backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    # Start a MySQL service container the job can connect to
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'rootpass' }}
          MYSQL_DATABASE: movies_to
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'rootpass' }}
      DB_NAME: movies_to
      DB_PORT: 3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./backend
        run: bun install

      - name: Add test dev dependencies
        working-directory: ./backend
        run: |
          bun add -d supertest vitest

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get update -y
          sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do
            mysql -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" -e "SELECT 1" >/dev/null 2>&1 && { echo "MySQL is up"; break; }
            echo "Waiting for MySQL ($i/30)..."
            sleep 2
          done

      - name: Setup test database
        working-directory: ./backend
        run: node src/config/setupDatabase.js

      - name: Run tests
        working-directory: ./backend
        run: bun run test
        continue-on-error: true

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        if: ${{ always() && secrets.CODECOV_TOKEN != '' }}
        with:
          directory: ./backend/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run Snyk security scan
        uses: snyk/actions/node@v1
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run bun audit
        continue-on-error: true
        run: |
          cd backend && bun install && bun audit || true
          cd .. && bun install && bun audit || true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-frontend, lint-and-test-backend]
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to Netlify (Staging)
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, lint-and-test-backend, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to Netlify (Production)
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production deploy from GitHub Actions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
